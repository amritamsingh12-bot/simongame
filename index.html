<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMON SAY GAME!</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
        
    <H1>Simon Game</H1>
     <h2>HELLOOO!!</h2>
    <div class="instructions" id="instructions">
    <h3>How to Play</h3>
    <p>1. Press any key (💻) or tap anywhere on white screen of phone (📱) to start.</p>
    <p>2. Watch the color sequence carefully.</p>
    <p>3. Repeat the same sequence by clicking the buttons.</p>
    <p>4. The sequence increases every level.</p>
</div>
    <div class="btn-container">
        <div class="line-one">
            <div class="btn red" type="button" id="red">1</div>
        <div class="btn yellow" type="button" id="yellow">2</div>
        </div>
        <div class="line-two">
<div class="btn green" type="button" id="green">3</div>
        <div class="btn purple" type="button" id="purple">4</div>
        </div>
        
    </div>
<script  src="app.js"></script>
</body>
</html>
